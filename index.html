<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Удалённая работа онлайн</title>
  <style>
    :root {
      --accent: #2563EB; /* Акцентный цвет */
      --accent-strong: #1D4ED8;
      --text-main: #0B1F3A;
      --text-muted: #667085;
      --line: rgba(136, 158, 187, 0.25);
      --panel: rgba(255, 255, 255, 0.78);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 8% 14%, rgba(37, 99, 235, 0.14), transparent 43%),
        radial-gradient(circle at 92% 10%, rgba(11, 31, 58, 0.11), transparent 38%),
        linear-gradient(160deg, #F8FAFC 0%, #F2F5FA 52%, #EEF2FA 100%);
      overflow: hidden;
    }

    .page {
      min-height: 100dvh;
      padding: 12px;
      display: grid;
      place-items: center;
    }

    .hero {
      width: min(1080px, 100%);
      height: min(760px, calc(100dvh - 24px));
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow:
        0 30px 70px -34px rgba(11, 31, 58, 0.35),
        0 10px 24px -16px rgba(11, 31, 58, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
    }

    .copy {
      padding: clamp(20px, 4.7vw, 46px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.7vh, 15px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.72));
    }

    .badge {
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent-strong);
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.2);
    }

    h1 {
      font-size: clamp(2rem, 6.2vw, 3.45rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      max-width: 14ch;
      text-wrap: balance;
    }

    .sub {
      font-size: clamp(0.98rem, 2.6vw, 1.2rem);
      color: var(--text-muted);
      font-weight: 500;
    }

    .list {
      list-style: none;
      display: grid;
      gap: 9px;
      margin-top: 2px;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(0.95rem, 2.4vw, 1.04rem);
      color: #22324C;
      font-weight: 500;
    }

    .tick {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      flex: 0 0 24px;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
    }

    .code-box {
      border-radius: 16px;
      border: 1px solid rgba(37, 99, 235, 0.24);
      padding: 13px;
      background: linear-gradient(150deg, rgba(233, 242, 255, 0.88), rgba(247, 250, 255, 0.84));
      box-shadow:
        0 10px 24px rgba(37, 99, 235, 0.11),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .code-label {
      font-size: clamp(0.9rem, 2.2vw, 0.98rem);
      font-weight: 600;
      color: #1E3766;
      line-height: 1.35;
    }

    .token {
      display: inline-block;
      margin-top: 9px;
      padding: 8px 13px;
      border-radius: 11px;
      border: 1px dashed rgba(37, 99, 235, 0.6);
      background: #fff;
      color: var(--text-main);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cta {
      margin-top: auto;
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      font-size: clamp(1rem, 2.8vw, 1.1rem);
      font-weight: 700;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      box-shadow:
        0 18px 34px -14px rgba(37, 99, 235, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.18) inset;
      transition: transform 0.22s ease, filter 0.22s ease, box-shadow 0.22s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 22px 38px -14px rgba(37, 99, 235, 0.78),
        0 0 0 1px rgba(255, 255, 255, 0.22) inset;
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.3);
      outline-offset: 2px;
    }

    .note {
      margin-top: 8px;
      text-align: center;
      font-size: 0.87rem;
      color: var(--text-muted);
    }

    .visual {
      display: none;
      position: relative;
      border-left: 1px solid var(--line);
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 255, 255, 0.9), transparent 45%),
        linear-gradient(170deg, rgba(234, 242, 255, 0.75), rgba(244, 248, 255, 0.56));
      padding: 26px;
      place-items: center;
    }

    .dash {
      width: min(420px, 100%);
      aspect-ratio: 1.25 / 1;
      border-radius: 22px;
      border: 1px solid rgba(138, 162, 196, 0.36);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.95), rgba(236, 244, 255, 0.9));
      box-shadow:
        0 32px 56px -32px rgba(11, 31, 58, 0.44),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
    }

    .dash::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.82);
    }

    .topbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      height: 30px;
      border-radius: 12px;
      border: 1px solid rgba(160, 181, 213, 0.34);
      background: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.46);
    }

    .screen {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 58px;
      bottom: 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(150deg, rgba(16, 41, 82, 0.94), rgba(37, 99, 235, 0.76)),
        linear-gradient(#111827, #111827);
      overflow: hidden;
    }

    .chart {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 14px;
      height: 45%;
      border-radius: 10px;
      border: 1px solid rgba(164, 191, 238, 0.34);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.16), transparent 32%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 16%),
        linear-gradient(180deg, rgba(154, 185, 239, 0.31), rgba(154, 185, 239, 0.08));
    }

    .cards {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini {
      height: 90px;
      border-radius: 10px;
      border: 1px solid rgba(164, 191, 238, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
      position: relative;
      overflow: hidden;
    }

    .mini::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 8px;
      background: repeating-linear-gradient(180deg, rgba(198, 216, 248, 0.6) 0 7px, transparent 7px 14px);
    }

    @media (min-width: 930px) {
      .hero {
        grid-template-columns: 1.08fr 0.92fr;
      }

      .visual {
        display: grid;
      }

      .cta {
        width: min(390px, 100%);
      }

      .note {
        text-align: left;
      }
    }

    @media (max-height: 760px) {
      .hero {
        height: calc(100dvh - 20px);
      }

      .copy {
        gap: 9px;
      }

      h1 {
        font-size: clamp(1.65rem, 5.1vw, 2.4rem);
      }

      .sub,
      .list li,
      .code-label {
        font-size: 0.9rem;
      }

      .token {
        font-size: 0.92rem;
      }

      .note {
        font-size: 0.8rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="title">
      <article class="copy">
        <p class="badge">Онлайн-формат</p>

        <!-- Заголовок -->
        <h1 id="title">Удалённая работа онлайн</h1>

        <!-- Подзаголовок -->
        <p class="sub">Гибкий график • Обучение • Быстрый отклик</p>

        <ul class="list" aria-label="Преимущества">
          <li><span class="tick" aria-hidden="true">✓</span><span>Работа онлайн</span></li>
          <li><span class="tick" aria-hidden="true">✓</span><span>Поддержка на старте</span></li>
          <li><span class="tick" aria-hidden="true">✓</span><span>Ответ менеджера в Telegram</span></li>
        </ul>

        <section class="code-box" aria-label="Кодовое слово">
          <p class="code-label">Для отклика напишите менеджеру кодовое слово</p>
          <!-- Кодовое слово -->
          <strong class="token">FINANCE</strong>
        </section>

        <!-- Telegram: замените deny22314 при необходимости -->
        <a class="cta" href="https://t.me/deny22314?text=FINANCE" rel="noopener">Написать менеджеру →</a>
        <p class="note">Telegram откроется автоматически • @deny22314</p>
      </article>

      <aside class="visual" aria-hidden="true">
        <div class="dash">
          <div class="topbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
          <div class="screen">
            <div class="chart"></div>
            <div class="cards">
              <div class="mini"></div>
              <div class="mini"></div>
            </div>
          </div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
