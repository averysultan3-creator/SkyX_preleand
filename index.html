<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Удалённая работа онлайн</title>
  <style>
    :root {
      /* 5. Акцентный цвет: измените основной акцент здесь */
      --accent: #2563EB;
      --accent-strong: #1D4ED8;
      --text-main: #0B1F3A;
      --text-muted: #667085;
      --panel: rgba(255, 255, 255, 0.74);
      --line: rgba(147, 167, 196, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 8% 12%, rgba(37, 99, 235, 0.13), transparent 44%),
        radial-gradient(circle at 92% 14%, rgba(11, 31, 58, 0.12), transparent 38%),
        linear-gradient(160deg, #F8FAFC 0%, #F2F5FA 52%, #EDF2FB 100%);
    }

    .page {
      min-height: 100svh;
      padding: 12px;
      display: grid;
      place-items: center;
    }

    .hero {
      width: min(1100px, 100%);
      min-height: calc(100svh - 24px);
      display: grid;
      grid-template-columns: 1fr;
      border: 1px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      background: var(--panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 28px 70px -34px rgba(11, 31, 58, 0.38),
        0 10px 24px -16px rgba(11, 31, 58, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .copy {
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 1.8vh, 16px);
      padding: clamp(20px, 5vw, 46px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.7));
    }

    .badge {
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--accent-strong);
      border: 1px solid rgba(37, 99, 235, 0.22);
      background: rgba(37, 99, 235, 0.09);
    }

    h1 {
      font-size: clamp(2rem, 6.7vw, 3.55rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      max-width: 11ch;
      text-wrap: balance;
    }

    .subheadline {
      font-size: clamp(0.98rem, 2.8vw, 1.22rem);
      color: var(--text-muted);
      font-weight: 500;
    }

    .benefits {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .benefits li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(0.96rem, 2.45vw, 1.06rem);
      font-weight: 500;
      color: #233451;
    }

    .check {
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(150deg, var(--accent), var(--accent-strong));
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    .code-card {
      margin-top: 2px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(37, 99, 235, 0.24);
      background: linear-gradient(150deg, rgba(232, 241, 255, 0.86), rgba(245, 249, 255, 0.85));
      box-shadow:
        0 10px 24px rgba(37, 99, 235, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .code-label {
      font-size: clamp(0.9rem, 2.25vw, 1rem);
      font-weight: 600;
      color: #1F3661;
      line-height: 1.36;
    }

    .token {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 13px;
      border-radius: 11px;
      border: 1px dashed rgba(37, 99, 235, 0.6);
      background: #FFFFFF;
      color: var(--text-main);
      font-size: 1rem;
      letter-spacing: 0.13em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cta {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: clamp(1rem, 2.9vw, 1.1rem);
      font-weight: 700;
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow:
        0 18px 34px -14px rgba(37, 99, 235, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.18) inset;
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 22px 36px -14px rgba(37, 99, 235, 0.78),
        0 0 0 1px rgba(255, 255, 255, 0.22) inset;
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.3);
      outline-offset: 2px;
    }

    .note {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    .visual {
      padding: clamp(18px, 4vw, 32px);
      background:
        radial-gradient(circle at 70% 16%, rgba(255, 255, 255, 0.85), transparent 47%),
        linear-gradient(170deg, rgba(233, 240, 255, 0.7), rgba(244, 248, 255, 0.52));
      display: grid;
      place-items: center;
    }

    .mockup {
      width: min(430px, 100%);
      aspect-ratio: 1.24 / 1;
      border-radius: 22px;
      border: 1px solid rgba(138, 162, 196, 0.35);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.95), rgba(237, 244, 255, 0.88));
      box-shadow:
        0 30px 50px -30px rgba(11, 31, 58, 0.46),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
      animation: float 5.8s ease-in-out infinite;
    }

    .mockup::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      pointer-events: none;
    }

    .row {
      position: absolute;
      left: 18px;
      right: 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(160, 181, 213, 0.34);
    }

    .row.top {
      top: 20px;
      height: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.45);
    }

    .screen {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 60px;
      bottom: 18px;
      border-radius: 14px;
      background:
        linear-gradient(150deg, rgba(15, 39, 80, 0.94), rgba(37, 99, 235, 0.77)),
        linear-gradient(#0F172A, #0F172A);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 18px 30px -16px rgba(11, 31, 58, 0.64);
      overflow: hidden;
    }

    .chart {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 14px;
      height: 44%;
      border-radius: 10px;
      border: 1px solid rgba(164, 191, 238, 0.34);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.16), transparent 32%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 16%),
        linear-gradient(180deg, rgba(154, 185, 239, 0.3), rgba(154, 185, 239, 0.07));
    }

    .chart::after {
      content: "";
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 20%;
      height: 2px;
      border-radius: 20px;
      background: linear-gradient(90deg, #8AB4FF, #FFFFFF);
      box-shadow: 0 0 14px rgba(138, 180, 255, 0.8);
      transform: skewX(-26deg);
    }

    .mini {
      position: absolute;
      bottom: 12px;
      width: 43%;
      height: 38%;
      border-radius: 10px;
      border: 1px solid rgba(164, 191, 238, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
    }

    .mini.left {
      left: 12px;
    }

    .mini.right {
      right: 12px;
    }

    .mini::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 12px;
      bottom: 12px;
      border-radius: 8px;
      background: repeating-linear-gradient(180deg, rgba(198, 216, 248, 0.6) 0 7px, transparent 7px 14px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @media (min-width: 960px) {
      .hero {
        grid-template-columns: 1.08fr 0.92fr;
      }

      .copy {
        border-right: 1px solid var(--line);
      }

      .cta {
        width: min(390px, 100%);
      }

      .note {
        text-align: left;
      }
    }

    @media (max-height: 780px) {
      .copy {
        gap: 10px;
      }

      .visual {
        padding: 14px 18px 18px;
      }

      .mockup {
        width: min(345px, 100%);
      }

      .note {
        font-size: 0.82rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mockup,
      .cta {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="main-title">
      <article class="copy">
        <p class="badge">Онлайн-формат</p>

        <!-- 1. Заголовок: измените текст ниже при необходимости -->
        <h1 id="main-title">Удалённая работа онлайн</h1>

        <!-- 2. Подзаголовок: измените текст ниже при необходимости -->
        <p class="subheadline">Гибкий график • Обучение • Быстрый отклик</p>

        <ul class="benefits" aria-label="Преимущества">
          <li><span class="check" aria-hidden="true">✓</span><span>Работа онлайн</span></li>
          <li><span class="check" aria-hidden="true">✓</span><span>Поддержка на старте</span></li>
          <li><span class="check" aria-hidden="true">✓</span><span>Ответ менеджера в Telegram</span></li>
        </ul>

        <section class="code-card" aria-label="Кодовое слово">
          <p class="code-label">Для отклика напишите менеджеру кодовое слово</p>
          <!-- 3. Кодовое слово: измените FINANCE ниже при необходимости -->
          <strong class="token" id="codeWordToken">FINANCE</strong>
        </section>

        <!-- 4. Ссылка Telegram: замените USERNAME на логин вашего менеджера -->
        <!-- Замените USERNAME в ссылке: https://t.me/USERNAME?text=FINANCE -->
        <a class="cta" id="ctaButton" href="https://t.me/USERNAME?text=FINANCE">Написать менеджеру →</a>
        <p class="note">Telegram откроется автоматически</p>
      </article>

      <aside class="visual" aria-label="Финансовая панель">
        <div class="mockup" aria-hidden="true">
          <div class="row top">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="screen">
            <div class="chart"></div>
            <div class="mini left"></div>
            <div class="mini right"></div>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    (function () {
      var codeWord = "FINANCE";
      var username = "USERNAME";
      var token = document.getElementById("codeWordToken");
      var cta = document.getElementById("ctaButton");

      if (!token || !cta) {
        return;
      }

      token.textContent = codeWord;
      cta.href = "https://t.me/" + username + "?text=" + encodeURIComponent(codeWord);
    })();
  </script>
</body>
</html>
